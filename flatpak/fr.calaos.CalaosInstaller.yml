app-id: fr.calaos.CalaosInstaller
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: calaos_installer

finish-args:
  # Network access for FTP upload to Calaos controllers, online project management
  - --share=network
  # IPC for X11/Wayland
  - --share=ipc
  # Display
  - --socket=x11
  - --socket=wayland
  - --socket=fallback-x11
  # Access to USB/SD devices for Calaos Machine Creator
  - --device=all
  # Access to home directory for reading/writing Calaos project files
  - --filesystem=home

modules:
  # Qt MQTT module - not included in KDE SDK, needed for Zigbee2MQTT support
  - name: qtmqtt
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTING=OFF
      - -Wno-dev
    sources:
      - type: git
        url: https://github.com/qt/qtmqtt.git
        # Must match the Qt version provided by the KDE SDK 6.8 runtime
        tag: v6.8.0
    cleanup:
      - /mkspecs

  # Main application: Calaos Installer
  - name: calaos-installer
    buildsystem: qmake
    config-opts:
      - PREFIX=/app
    sources:
      - type: dir
        path: ..
    post-install:
      # Install the icon with the correct Flatpak app-id name
      # NOTE: Replace data/img/calaos_icon.png with your actual square icon (128x128 minimum)
      - install -Dm644 data/img/calaos_icon.png /app/share/icons/hicolor/128x128/apps/fr.calaos.CalaosInstaller.png

  # Secondary application: Calaos Machine Creator
  # KArchive is provided by the KDE SDK, no need to build it
  - name: calaos-machinecreator
    buildsystem: qmake
    config-opts:
      - PREFIX=/app
    sources:
      - type: dir
        path: ../machine_creator
